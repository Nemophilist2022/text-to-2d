<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Text-to-2D Asset Workbench</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23020617'/%3E%3Cpath d='M16 3 29 16 16 29 3 16Z' fill='%2322C55E'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="shell">
    <section class="hero" aria-labelledby="hero-title">
      <div>
        <p class="eyebrow">Text → Preset → Prompt → Quality → Export</p>
        <h1 id="hero-title">Text-to-2D Asset Workbench</h1>
        <p class="hero-copy">输入一句话，点击生成，走本地 codex-local 后端完成可观察的 2D 游戏素材闭环。真实 API 暂时可选，不作为当前验收依赖。</p>
      </div>
      <div class="command-card">
        <span class="label">CLI</span>
        <code id="active-command">loading...</code>
        <button id="copy-command" type="button">Copy</button>
      </div>
    </section>

    <form class="control-panel" id="generate-form" aria-label="Generate asset form">
      <label class="text-field">Text
        <input id="text-input" name="text" value="像素风宝石道具" autocomplete="off">
      </label>
      <label>Asset Type
        <select id="asset-type" name="assetType">
          <option value="character">character</option>
          <option value="monster">monster</option>
          <option value="item" selected>item</option>
          <option value="map-tile">map-tile</option>
          <option value="ui-icon">ui-icon</option>
        </select>
      </label>
      <label>Style
        <select id="style" name="style">
          <option value="pixel" selected>pixel</option>
          <option value="chibi">chibi</option>
          <option value="dark">dark</option>
          <option value="chinese">chinese</option>
          <option value="sci-fi">sci-fi</option>
        </select>
      </label>
      <label>Size
        <select id="size" name="size">
          <option value="32x32" selected>32x32</option>
          <option value="64x64">64x64</option>
          <option value="128x128">128x128</option>
        </select>
      </label>
      <label>Backend
        <select id="backend" name="backendId">
          <option value="codex-local" selected>codex-local</option>
          <option value="prebuilt">prebuilt</option>
          <option value="mock-ai">mock-ai</option>
          <option value="chat-svg">chat-svg</option>
        </select>
      </label>
      <label class="toggle-field">
        <input id="force-regenerate" name="forceRegenerate" type="checkbox">
        Force regenerate
      </label>
      <button class="generate-button" id="generate-button" type="submit">Generate Asset</button>
      <p class="form-status" id="form-status" role="status">Ready. API limit safe mode: codex-local default.</p>
    </form>

    <section class="layout-grid">
      <nav class="asset-list" id="asset-list" aria-label="Generated and demo assets"></nav>
      <article class="preview-card">
        <div class="preview-header">
          <div>
            <p class="eyebrow">Preview</p>
            <h2 id="asset-title">Loading</h2>
          </div>
          <span id="cache-status" class="status-pill">cache</span>
        </div>
        <div class="sprite-stage">
          <img id="sprite-preview" alt="Generated 2D asset preview">
        </div>
        <dl class="metadata-grid">
          <div><dt>Preset</dt><dd id="preset-id">-</dd></div>
          <div><dt>Subject</dt><dd id="subject">-</dd></div>
          <div><dt>Frame</dt><dd id="frame-path">-</dd></div>
          <div><dt>Atlas</dt><dd id="atlas-path">-</dd></div>
        </dl>
      </article>
      <aside class="inspector">
        <h2>Prompt Sections</h2>
        <div id="prompt-sections" class="section-stack"></div>
        <h2>Quality Reports</h2>
        <div id="quality-reports" class="section-stack"></div>
      </aside>
    </section>
  </main>
  <script src="demo-gallery.js"></script>
  <script src="app.js"></script>
</body>
</html>
