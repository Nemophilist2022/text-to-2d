<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Text-to-2D Asset Workbench</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23020617'/%3E%3Cpath d='M16 3 29 16 16 29 3 16Z' fill='%2322C55E'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="shell">
    <section class="hero" aria-labelledby="hero-title">
      <div>
        <p class="eyebrow">Text → Preset → Prompt → Quality → Export</p>
        <h1 id="hero-title">Text-to-2D Asset Workbench</h1>
        <p class="hero-copy">面向 2D 游戏开发流程的参数化素材生成展示台。静态页面只读取 demo manifest，不保存密钥，不直接调用 API。</p>
      </div>
      <div class="command-card">
        <span class="label">CLI</span>
        <code id="active-command">loading...</code>
        <button id="copy-command" type="button">Copy</button>
      </div>
    </section>

    <section class="control-panel" aria-label="Asset controls">
      <label>Text<input id="text-input" readonly></label>
      <label>Asset Type<input id="asset-type" readonly></label>
      <label>Style<input id="style" readonly></label>
      <label>Size<input id="size" readonly></label>
      <label>Backend<input id="backend" readonly></label>
    </section>

    <section class="layout-grid">
      <nav class="asset-list" id="asset-list" aria-label="Demo assets"></nav>
      <article class="preview-card">
        <div class="preview-header">
          <div>
            <p class="eyebrow">Preview</p>
            <h2 id="asset-title">Loading</h2>
          </div>
          <span id="cache-status" class="status-pill">cache</span>
        </div>
        <div class="sprite-stage">
          <img id="sprite-preview" alt="Generated 2D asset preview">
        </div>
        <dl class="metadata-grid">
          <div><dt>Preset</dt><dd id="preset-id">-</dd></div>
          <div><dt>Subject</dt><dd id="subject">-</dd></div>
          <div><dt>Frame</dt><dd id="frame-path">-</dd></div>
          <div><dt>Atlas</dt><dd id="atlas-path">-</dd></div>
        </dl>
      </article>
      <aside class="inspector">
        <h2>Prompt Sections</h2>
        <div id="prompt-sections" class="section-stack"></div>
        <h2>Quality Reports</h2>
        <div id="quality-reports" class="section-stack"></div>
      </aside>
    </section>
  </main>
  <script src="demo-gallery.js"></script>
  <script src="app.js"></script>
</body>
</html>
